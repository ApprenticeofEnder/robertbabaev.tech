name: Build and Upload Resume

on:
  push:
    branches: [main]
    paths:
      - 'resume/**'
      - 'config/resume_data.toml'
      - 'config/resume_variants/**'
      - 'scripts/generate_resume_data.ts'
      - 'src/lib/resume/**'
  workflow_dispatch:

jobs:
  build-resume:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/devenv-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Verify generated resume data
        run: |
          pnpm generate-resume-data
          git diff --exit-code resume/

      - name: Compile resume
        run: compile-resume

      - name: Upload Resume(s)
        env:
          DO_SPACES_ACCESS_KEY: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          DO_SPACES_SECRET_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: upload-resume
