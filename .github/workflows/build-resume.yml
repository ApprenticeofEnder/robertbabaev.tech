name: Build and Upload Resume

on:
  push:
    branches: [main]
    paths:
      - 'resume/**'
      - 'config/resume_data.toml'
      - 'config/resume_variants/**'
      - 'scripts/generate_resume_data.ts'
      - 'src/lib/resume/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-resume:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load secrets from Pulumi ESC
        uses: ./.github/actions/pulumi-esc
        with:
          export-environment-variables: >-
            CACHIX_AUTH_TOKEN,DO_SPACES_ACCESS_KEY,DO_SPACES_SECRET_KEY,DO_SPACES_BUCKET,DO_SPACES_REGION

      - uses: ./.github/actions/devenv-setup

      - name: Verify generated resume data
        run: |
          pnpm generate-resume-data
          git diff --exit-code resume/

      - name: Compile resume
        run: compile-resume

      - name: Upload Resume(s)
        run: upload-resume
