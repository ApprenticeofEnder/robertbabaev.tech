name: Deploy to DigitalOcean

on:
  push:
    branches:
      - "main"
    paths:
      - "resume/**"
      - "config/resume_data.toml"
      - "config/resume_variants/**"
      - "scripts/generate_resume_data.ts"
      - "src/lib/resume/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: devenv-ci {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load secrets from Pulumi ESC
        uses: ./.github/actions/pulumi-esc
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - uses: ./.github/actions/devenv-setup
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated resume data
        run: |
          pnpm generate-resume-data
          git diff --exit-code resume/

      - name: Deploy
        timeout-minutes: 5
        if: ${{ !github.event.act }}
        run: deploy
