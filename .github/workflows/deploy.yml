name: Deploy to DigitalOcean

on:
  push:
    branches:
      - 'main'
    paths:
      - 'terraform/**'
  workflow_dispatch:

env:
  TERRAFORM_DIR: terraform

jobs:
  deploy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/devenv-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 'Setup Terraform'
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DO_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_do_bucket: ${{ vars.DO_SPACES_BUCKET }}
          TF_VAR_do_region: ${{ vars.DO_SPACES_REGION }}
          TF_VAR_do_token: ${{ vars.DO_TOKEN }}
          TF_VAR_do_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_do_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          tofu -version
          cd $TERRAFORM_DIR
          tofu init
          tofu validate

      - name: 'Deploy'
        timeout-minutes: 5
        if: ${{ !github.event.act }}
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DO_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_do_bucket: ${{ vars.DO_SPACES_BUCKET }}
          TF_VAR_do_region: ${{ vars.DO_SPACES_REGION }}
          TF_VAR_do_token: ${{ vars.DO_TOKEN }}
          TF_VAR_do_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_do_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          cd $TERRAFORM_DIR
          tofu plan -out .terraform-plan
          tofu apply .terraform-plan
