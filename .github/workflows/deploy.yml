name: Deploy to DigitalOcean

on:
  push:
    branches:
      - 'main'
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  TERRAFORM_DIR: terraform

jobs:
  deploy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load secrets from Pulumi ESC
        uses: ./.github/actions/pulumi-esc
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - uses: ./.github/actions/devenv-setup

      - name: Map ESC vars for Terraform
        shell: bash
        run: |
          {
            echo "AWS_ACCESS_KEY_ID=$DO_SPACES_ACCESS_KEY"
            echo "AWS_SECRET_ACCESS_KEY=$DO_SPACES_SECRET_KEY"
            echo "DIGITALOCEAN_TOKEN=$DO_TOKEN"
            echo "TF_VAR_do_token=$DO_TOKEN"
            echo "TF_VAR_do_access_id=$DO_SPACES_ACCESS_KEY"
            echo "TF_VAR_do_secret_key=$DO_SPACES_SECRET_KEY"
            echo "TF_VAR_do_bucket=$DO_SPACES_BUCKET"
            echo "TF_VAR_do_region=$DO_SPACES_REGION"
          } >> "$GITHUB_ENV"

      - name: 'Setup Terraform'
        run: |
          tofu -version
          cd $TERRAFORM_DIR
          tofu init
          tofu validate

      - name: 'Deploy'
        timeout-minutes: 5
        if: ${{ !github.event.act }}
        run: |
          cd $TERRAFORM_DIR
          tofu plan -out .terraform-plan
          tofu apply .terraform-plan
