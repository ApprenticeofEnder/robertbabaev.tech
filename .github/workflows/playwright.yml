name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: devenv-ci {0}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load secrets from Pulumi ESC
        uses: ./.github/actions/pulumi-esc
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          export-environment-variables: CACHIX_AUTH_TOKEN

      - uses: ./.github/actions/devenv-setup

      - name: Setup cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_URL_ORIGIN: 'http://127.0.0.1:4173'
          PUBLIC_DEV_RESUME: 'http://127.0.0.1:4173/dev/resume.pdf'
          PUBLIC_DEVOPS_RESUME: 'http://127.0.0.1:4173/devops/resume.pdf'
          PUBLIC_SECURITY_RESUME: 'http://127.0.0.1:4173/security/resume.pdf'
        run: pnpm build

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          set -x
          pnpm exec playwright install --with-deps

      - name: Install Playwright Browsers - Cache Hit
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          set -x
          pnpm exec playwright install-deps

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() && !github.event.act  }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
