name: Load Pulumi ESC environment
description: Authenticate with Pulumi Cloud and inject ESC environment variables
inputs:
  environment:
    description: ESC environment name (org/project/env)
    required: false
    default: ApprenticeofEnder/robertbabaev.tech/prod
  export-environment-variables:
    description: >
      ESC variables to export. Use true for all, false for none, or a comma-separated
      list (optionally ENV=SECRET mappings). See pulumi/esc-action docs.
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Verify Pulumi access token
      shell: bash
      env:
        PULUMI_ACCESS_TOKEN: ${{ env.PULUMI_ACCESS_TOKEN }}
      run: |
        if [ -z "$PULUMI_ACCESS_TOKEN" ]; then
          echo "PULUMI_ACCESS_TOKEN is not set. Add it as a repository secret." >&2
          exit 1
        fi

    - name: Load ESC environment
      uses: pulumi/esc-action@f3cfbabf37488463817366338165b92b5f99117e # v2.0.0
      env:
        PULUMI_ACCESS_TOKEN: ${{ env.PULUMI_ACCESS_TOKEN }}
      with:
        environment: ${{ inputs.environment }}
        export-environment-variables: ${{ inputs.export-environment-variables }}
