name: Setup devenv
description: Install Nix, Cachix, and devenv
inputs:
  cachix-auth-token:
    description: Auth token for the rbabaev Cachix cache
    required: false
runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31
    - uses: cachix/cachix-action@v16
      with:
        name: devenv
    - name: Configure rbabaev Cachix cache
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
      run: cachix use rbabaev
    - name: Install devenv.sh
      shell: bash
      run: nix profile add nixpkgs#devenv
