name: Setup devenv
description: Install Nix, Cachix, and devenv
inputs:
  GITHUB_TOKEN:
    description: "GitHub's GITHUB_TOKEN secret."
    required: true

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      with:
        github_access_token: ${{ inputs.GITHUB_TOKEN }}
        extra_nix_config: |
          keep-env-derivations = true
          keep-outputs = true
    - name: Restore and save Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        # restore and save a cache using this key
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', 'devenv.lock') }}
        # if there's no cache hit, restore a cache by this prefix
        restore-prefixes-first-match: nix-${{ runner.os }}-
        # collect garbage until the Nix store size (in bytes) is at most this number
        # before trying to save a new cache
        # 1G = 1073741824
        gc-max-store-size-linux: 1G
        # do purge caches
        purge: true
        # purge all versions of the cache
        purge-prefixes: nix-${{ runner.os }}-
        # created more than this number of seconds ago
        purge-created: 0
        # or last accessed this duration (ISO 8601 duration format)
        # before the start of the `Post Restore and save Nix store` phase
        purge-last-accessed: P1DT12H
        # except any version with the key that is the same as the `primary-key`
        purge-primary-key: never
    - uses: cachix/cachix-action@6f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: devenv
    - name: Configure rbabaev Cachix cache
      shell: bash
      run: |
        if [ -z "$CACHIX_AUTH_TOKEN" ]; then
          echo "CACHIX_AUTH_TOKEN is not set. Load secrets from Pulumi ESC before devenv-setup." >&2
          exit 1
        fi
        cachix use rbabaev
    - name: Install devenv CI wrapper
      shell: bash
      run: |
        install -m 755 ./scripts/devenv-ci.sh /usr/local/bin/devenv-ci
    - name: Install devenv.sh
      shell: bash
      run: |
        DEVENV_CI_LIB_ONLY=1 source ./scripts/devenv-ci.sh
        with_gc_race_retry nix profile add nixpkgs#devenv
        with_gc_race_retry devenv shell -- echo "devenv shell ready"
