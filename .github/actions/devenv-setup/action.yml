name: Setup devenv
description: Install Nix, Cachix, and devenv
inputs:
  cachix-auth-token:
    description: Auth token for the rbabaev Cachix cache
    required: false
runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: devenv
    - name: Configure rbabaev Cachix cache
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
      run: cachix use rbabaev
    - name: Install devenv.sh
      shell: bash
      run: nix profile add nixpkgs#devenv
