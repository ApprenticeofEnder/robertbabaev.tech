name: Setup devenv
description: Install Nix, Cachix, and devenv
runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: devenv
    - name: Configure rbabaev Cachix cache
      shell: bash
      run: |
        if [ -z "$CACHIX_AUTH_TOKEN" ]; then
          echo "CACHIX_AUTH_TOKEN is not set. Load secrets from Pulumi ESC before devenv-setup." >&2
          exit 1
        fi
        cachix use rbabaev
    - name: Install devenv.sh
      shell: bash
      run: |
        chmod +x ./scripts/devenv-ci.sh
        DEVENV_CI_LIB_ONLY=1 source ./scripts/devenv-ci.sh
        with_gc_race_retry nix profile add nixpkgs#devenv
        with_gc_race_retry devenv shell -- echo "devenv shell ready"
